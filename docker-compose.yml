services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: macna_banking
      MYSQL_USER: banking_user
      MYSQL_PASSWORD: banking_password
      MYSQL_ROOT_PASSWORD: root_password
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "4848:4848"

volumes:
  mysql_data:

