name: CI/CD

on:
  pull_request:
    paths:
      - "pom.xml"
      - "*/pom.xml"
      - "**/src/**"
      - "Dockerfile"
      - "docker/**"
      - "database/**"
      - ".github/workflows/ci-cd.yml"
  push:
    branches: [main]
    paths:
      - "pom.xml"
      - "*/pom.xml"
      - "**/src/**"
      - "Dockerfile"
      - "docker/**"
      - "database/**"
      - ".github/workflows/ci-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test with Java 17
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java and Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests and package EAR
        run: mvn --batch-mode --no-transfer-progress verify

  deploy:
    name: Deploy production to Heroku
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    concurrency:
      group: heroku-production
      cancel-in-progress: false
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
      IMAGE: registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/web
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Heroku Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.heroku.com
          username: _
          password: ${{ secrets.HEROKU_API_KEY }}

      - name: Build and push verified image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Install Heroku CLI
        run: curl -fsSL https://cli-assets.heroku.com/install.sh | sh

      - name: Release container
        run: heroku container:release web --app "$HEROKU_APP_NAME"

      - name: Smoke test login page
        run: |
          APP_URL=$(heroku apps:info --app "$HEROKU_APP_NAME" --json | jq -r '.app.web_url')
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error "${APP_URL}banking-system/login" >/dev/null; then
              echo "Deployment is healthy at ${APP_URL}banking-system/"
              exit 0
            fi
            sleep 5
          done
          echo "Deployment did not become healthy in time."
          exit 1
